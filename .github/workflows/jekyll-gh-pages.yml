name: Deploy README Only

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 完美修改點：把 _config.yml 和 _layouts 也複製進乾淨的工作區！
      - name: Prepare Clean Workspace
        run: |
          mkdir _pages_site
          cp README.md _pages_site/index.md
          cp _config.yml _pages_site/
          cp -r _layouts _pages_site/
          # 如果你的 NG 倉庫 README 裡有圖片，請把下面這行的註解拿掉並換成你的圖片資料夾名稱
          # cp -r images _pages_site/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          # 告訴 Jekyll 編譯這個包含了 README 與完美底板的資料夾
          source: ./_pages_site
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
